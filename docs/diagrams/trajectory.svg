<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="axArr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#565f89"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#0d1117" rx="10"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#c0caf5">
    Pick-and-Place Trajectory Profile
  </text>
  <text x="350" y="48" text-anchor="middle" font-size="11" fill="#565f89">
    Cubic polynomial: theta(t) = a_0 + a_1*t + a_2*t^2 + a_3*t^3
  </text>

  <!-- Axes -->
  <!-- X axis (time) -->
  <line x1="70" y1="310" x2="670" y2="310" stroke="#565f89" stroke-width="1.5" marker-end="url(#axArr)"/>
  <text x="670" y="335" text-anchor="end" font-size="12" fill="#565f89">Time (t)</text>

  <!-- Y axis (height / z position) -->
  <line x1="70" y1="320" x2="70" y2="60" stroke="#565f89" stroke-width="1.5" marker-end="url(#axArr)"/>
  <text x="30" y="65" font-size="12" fill="#565f89">Height</text>
  <text x="30" y="80" font-size="12" fill="#565f89">(z)</text>

  <!-- Grid lines -->
  <line x1="70" y1="100" x2="660" y2="100" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,5"/>
  <text x="60" y="104" text-anchor="end" font-size="9" fill="#565f89">Safe</text>
  <line x1="70" y1="260" x2="660" y2="260" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,5"/>
  <text x="60" y="264" text-anchor="end" font-size="9" fill="#565f89">Surface</text>

  <!-- Phase markers (vertical dashed lines) -->
  <line x1="120" y1="90" x2="120" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="180" y1="90" x2="180" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="230" y1="90" x2="230" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="280" y1="90" x2="280" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="370" y1="90" x2="370" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="460" y1="90" x2="460" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="510" y1="90" x2="510" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="560" y1="90" x2="560" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>
  <line x1="640" y1="90" x2="640" y2="315" stroke="#30363d" stroke-width="0.5" stroke-dasharray="2,4"/>

  <!-- Trajectory curve (smooth S-curves using cubic bezier) -->
  <path d="
    M 80,100
    C 90,100 110,100 120,100
    C 135,100 155,100 165,180
    C 175,240 178,260 180,260
    C 182,260 195,260 215,260
    C 225,260 228,260 230,260
    C 232,250 240,170 255,110
    C 265,100 275,100 280,100
    C 290,100 330,100 370,100
    C 380,100 385,100 395,140
    C 420,230 445,260 460,260
    C 470,260 490,260 500,260
    C 510,260 515,250 525,180
    C 540,110 550,100 560,100
    C 580,100 620,100 640,100
  " fill="none" stroke="#7aa2f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Phase labels (rotated, above) -->
  <g font-size="9" fill="#a9b1d6" text-anchor="middle">
    <text x="100" y="82">Approach</text>
    <text x="150" y="82">Descend</text>
    <text x="205" y="82" fill="#51cf66" font-weight="bold">Grip</text>
    <text x="255" y="82">Ascend</text>
    <text x="325" y="82">Transit</text>
    <text x="415" y="82">Descend</text>
    <text x="485" y="82" fill="#f7768e" font-weight="bold">Release</text>
    <text x="535" y="82">Ascend</text>
    <text x="600" y="82">Return</text>
  </g>

  <!-- Grip indicator -->
  <circle cx="205" cy="260" r="5" fill="#51cf66" opacity="0.8"/>
  <text x="205" y="280" text-anchor="middle" font-size="8" fill="#51cf66">Close</text>

  <!-- Release indicator -->
  <circle cx="485" cy="260" r="5" fill="#f7768e" opacity="0.8"/>
  <text x="485" y="280" text-anchor="middle" font-size="8" fill="#f7768e">Open</text>

  <!-- Block icon at pick position -->
  <rect x="197" y="252" width="16" height="16" rx="2" fill="none" stroke="#51cf66" stroke-width="1.5"/>

  <!-- Block icon at place position -->
  <rect x="477" y="252" width="16" height="16" rx="2" fill="#e0af68" stroke="#e0af68" stroke-width="1" opacity="0.6"/>

  <!-- Velocity profile (below, smaller) -->
  <text x="350" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#e0af68">
    Velocity: theta_dot(t) = 6*(theta_end - theta_start)/T^2 * t * (1 - t/T)
  </text>
  <text x="350" y="368" text-anchor="middle" font-size="10" fill="#565f89">
    Smooth S-curve profile: zero velocity at start and end of each segment
  </text>

  <!-- Legend -->
  <g transform="translate(540,340)">
    <rect x="0" y="0" width="140" height="50" rx="4" fill="#1a1b26" stroke="#30363d" stroke-width="1"/>
    <line x1="10" y1="15" x2="30" y2="15" stroke="#7aa2f7" stroke-width="2.5"/>
    <text x="36" y="19" font-size="9" fill="#a9b1d6">End-effector path</text>
    <circle cx="20" cy="35" r="4" fill="#51cf66" opacity="0.8"/>
    <text x="36" y="39" font-size="9" fill="#a9b1d6">Grip / Release</text>
  </g>
</svg>
