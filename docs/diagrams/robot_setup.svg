<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196F3"/>
    </marker>
    <linearGradient id="tableGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#6B5335"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">Robotic Writer — Physical Setup (Top View)</text>

  <!-- Table surface -->
  <rect x="50" y="60" width="700" height="500" rx="10" fill="url(#tableGrad)" opacity="0.15" stroke="#8B7355" stroke-width="2"/>
  <text x="400" y="85" text-anchor="middle" font-size="12" fill="#8B7355">Work Table</text>

  <!-- Robot base (center) -->
  <circle cx="400" cy="330" r="25" fill="#444" stroke="#222" stroke-width="3"/>
  <circle cx="400" cy="330" r="8" fill="#666"/>
  <text x="400" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Robot Base</text>
  <text x="400" y="385" text-anchor="middle" font-size="11" fill="#666">Scorbot III</text>

  <!-- Block circle arc -->
  <path d="M 160,330 A 240,240 0 0,1 640,330" fill="none" stroke="#4CAF50" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="110" text-anchor="middle" font-size="13" fill="#4CAF50" font-weight="bold">Block Circle (R = 350 mm)</text>

  <!-- Letter blocks on the arc -->
  <g font-size="10" font-weight="bold" text-anchor="middle">
    <!-- A -->
    <rect x="153" y="275" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="163" y="290" fill="white">A</text>
    <!-- B -->
    <rect x="170" y="235" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="180" y="250" fill="white">B</text>
    <!-- C -->
    <rect x="195" y="200" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="205" y="215" fill="white">C</text>
    <!-- D -->
    <rect x="228" y="170" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="238" y="185" fill="white">D</text>
    <!-- E -->
    <rect x="265" y="147" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="275" y="162" fill="white">E</text>
    <!-- ... -->
    <rect x="305" y="132" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="315" y="147" fill="white">F</text>
    <!-- G-H-I near top -->
    <rect x="345" y="125" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="355" y="140" fill="white">G</text>
    <rect x="388" y="122" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="398" y="137" fill="white">H</text>
    <rect x="430" y="125" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="440" y="140" fill="white">I</text>
    <!-- More blocks on right side -->
    <rect x="472" y="132" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="482" y="147" fill="white">J</text>
    <rect x="510" y="147" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="520" y="162" fill="white">K</text>
    <rect x="545" y="170" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="555" y="185" fill="white">L</text>
    <rect x="575" y="200" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="585" y="215" fill="white">M</text>
    <rect x="600" y="235" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="610" y="250" fill="white">N</text>
    <rect x="618" y="275" width="20" height="20" rx="3" fill="#66BB6A" stroke="#333" stroke-width="1"/>
    <text x="628" y="290" fill="white">O</text>
    <!-- Ellipsis for remaining -->
    <text x="645" y="320" fill="#4CAF50" font-size="16">...</text>
    <text x="145" y="320" fill="#4CAF50" font-size="16">...</text>
  </g>

  <!-- Writing line -->
  <line x1="250" y1="470" x2="550" y2="470" stroke="#FF9800" stroke-width="3"/>
  <text x="400" y="500" text-anchor="middle" font-size="13" fill="#FF9800" font-weight="bold">Writing Line (output)</text>

  <!-- Placed blocks on writing line -->
  <g font-size="10" font-weight="bold" text-anchor="middle">
    <rect x="260" y="458" width="22" height="22" rx="3" fill="#FFA726" stroke="#333" stroke-width="1"/>
    <text x="271" y="474" fill="white">H</text>
    <rect x="290" y="458" width="22" height="22" rx="3" fill="#FFA726" stroke="#333" stroke-width="1"/>
    <text x="301" y="474" fill="white">E</text>
    <rect x="320" y="458" width="22" height="22" rx="3" fill="#FFA726" stroke="#333" stroke-width="1"/>
    <text x="331" y="474" fill="white">L</text>
    <rect x="350" y="458" width="22" height="22" rx="3" fill="#FFA726" stroke="#333" stroke-width="1"/>
    <text x="361" y="474" fill="white">L</text>
    <rect x="380" y="458" width="22" height="22" rx="3" fill="#FFA726" stroke="#333" stroke-width="1"/>
    <text x="391" y="474" fill="white">O</text>
    <!-- Empty slots -->
    <rect x="410" y="458" width="22" height="22" rx="3" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,3"/>
    <rect x="440" y="458" width="22" height="22" rx="3" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- Robot arm illustration (simplified) -->
  <line x1="400" y1="330" x2="350" y2="230" stroke="#2196F3" stroke-width="5" stroke-linecap="round"/>
  <line x1="350" y1="230" x2="310" y2="170" stroke="#2196F3" stroke-width="4" stroke-linecap="round"/>
  <circle cx="350" cy="230" r="5" fill="#1976D2"/>
  <circle cx="310" cy="170" r="5" fill="#1976D2"/>
  <!-- Gripper -->
  <line x1="303" y1="165" x2="298" y2="155" stroke="#F44336" stroke-width="3"/>
  <line x1="317" y1="165" x2="322" y2="155" stroke="#F44336" stroke-width="3"/>

  <!-- Radius annotation -->
  <line x1="400" y1="330" x2="585" y2="210" stroke="#2196F3" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="510" y="260" font-size="11" fill="#2196F3" transform="rotate(-30,510,260)">R = 350 mm</text>

  <!-- Angular separation annotation -->
  <path d="M 345,125 A 240,240 0 0,1 388,122" fill="none" stroke="#E91E63" stroke-width="2"/>
  <text x="358" y="115" font-size="10" fill="#E91E63">Δθ = 8°</text>

  <!-- Legend -->
  <g transform="translate(580,420)">
    <rect x="0" y="0" width="170" height="120" rx="5" fill="white" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text x="85" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
    <rect x="10" y="28" width="12" height="12" rx="2" fill="#66BB6A"/>
    <text x="28" y="39" font-size="10" fill="#333">Available block</text>
    <rect x="10" y="48" width="12" height="12" rx="2" fill="#FFA726"/>
    <text x="28" y="59" font-size="10" fill="#333">Placed block</text>
    <line x1="10" y1="74" x2="22" y2="74" stroke="#2196F3" stroke-width="3"/>
    <text x="28" y="78" font-size="10" fill="#333">Robot arm</text>
    <line x1="10" y1="94" x2="22" y2="94" stroke="#FF9800" stroke-width="3"/>
    <text x="28" y="98" font-size="10" fill="#333">Writing line</text>
    <circle cx="16" cy="112" r="5" fill="#444" stroke="#222" stroke-width="1"/>
    <text x="28" y="116" font-size="10" fill="#333">Robot base</text>
  </g>
</svg>
